<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>XYZ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:
url("images/background.jpg")
center center / cover no-repeat;

font-family:
monospace;

overflow:hidden;

height:100vh;

color:white;

}

/* =========================
   ENTRY SCREEN
========================= */

#entryScreen{

position:fixed;

inset:0;

background:
rgba(0,0,0,.85);

display:flex;

justify-content:center;
align-items:center;

z-index:9999;

}

#enterButton{

padding:18px 35px;

font-size:
clamp(1.2rem,2vw,2rem);

cursor:pointer;

border:2px solid white;

background:black;

transition:.2s;

}

#enterButton:hover{

transform:
scale(1.05);

}

/* =========================
   TITLE
========================= */

#title{

position:fixed;

left:50%;
top:50%;

transform:
translate(-50%,-50%);

font-size:
clamp(4rem,12vw,12rem);

font-weight:bold;

opacity:0;

text-align:center;

pointer-events:none;

text-shadow:
0 0 20px white,
0 0 40px white,
0 0 80px white;

z-index:50;

}

/* =========================
   DISCLAIMER
========================= */

#warningBox{

position:fixed;

left:50%;
top:50%;

transform:
translate(-50%,-50%);

width:min(800px,90vw);

padding:30px;

background:
rgba(0,0,0,.75);

backdrop-filter:
blur(4px);

border:
2px solid rgba(255,255,255,.4);

opacity:0;

text-align:center;

z-index:20;

}

#warningBox h1{

margin-bottom:20px;

font-size:2.2rem;

}

#warningBox p{

line-height:1.8;

font-size:1.1rem;

}

/* =========================
   PROCEED BUTTON
========================= */

#proceed{

margin-top:25px;

display:inline-block;

padding:12px 24px;

border:2px solid white;

cursor:pointer;

transition:.2s;

}

#proceed:hover{

transform:
scale(1.05);

}

/* =========================
   LOADING GIF
========================= */

#loader{

position:fixed;

right:20px;
bottom:20px;

width:90px;

opacity:0;

z-index:100;

}

/* =========================
   ANIMATIONS
========================= */

@keyframes titleBurst{

0%{

opacity:0;

transform:
translate(-50%,-50%)
scale(0.1);

}

25%{

opacity:1;

transform:
translate(-50%,-50%)
scale(1.4);

}

50%{

transform:
translate(-50%,-50%)
scale(1);

}

100%{

opacity:1;

transform:
translate(-50%,-50%)
scale(1);

}

}

@keyframes titleMove{

from{

top:50%;

}

to{

top:10%;

}

}

@keyframes shake{

0%{
transform:translate(0px);
}

25%{
transform:translate(-4px);
}

50%{
transform:translate(4px);
}

75%{
transform:translate(-3px);
}

100%{
transform:translate(0px);
}

}

@keyframes warningShake{

0%{
transform:translate(-50%,-50%);
}

20%{
transform:translate(calc(-50% - 6px),-50%);
}

40%{
transform:translate(calc(-50% + 6px),-50%);
}

60%{
transform:translate(calc(-50% - 4px),-50%);
}

80%{
transform:translate(calc(-50% + 4px),-50%);
}

100%{
transform:translate(-50%,-50%);
}

}

@keyframes flash{

0%{
opacity:1;
}

50%{
opacity:0;
}

100%{
opacity:1;
}

}

.flash{

animation:
flash .12s 8;

}

</style>
</head>

<body>

<!-- ENTRY -->

<div id="entryScreen">

<div id="enterButton">

CLICK TO PROCEED

</div>

</div>

<!-- TITLE -->

<div id="title">

XYZ

</div>

<!-- WARNING -->

<div id="warningBox">

<h1>WARNING</h1>

<p>

This website contains:

<br><br>

• Audio

<br>

• Flashing imagery

<br>

• Hidden content

<br>

• Unsettling themes

<br>

• Experimental visual effects

</p>

<div id="proceed">

PROCEED

</div>

</div>

<!-- GIF -->

<img
id="loader"
src="images/loading.gif"
alt="loading">

<!-- AUDIO -->

<audio
id="titleSound"
src="audio/title.mp3"></audio>

<audio
id="warningSound"
src="audio/hum.mp3"
loop></audio>

<script>

const entryScreen =
document.getElementById(
"entryScreen"
);

const enterButton =
document.getElementById(
"enterButton"
);

const title =
document.getElementById(
"title"
);

const warningBox =
document.getElementById(
"warningBox"
);

const proceed =
document.getElementById(
"proceed"
);

const loader =
document.getElementById(
"loader"
);

const titleSound =
document.getElementById(
"titleSound"
);

const warningSound =
document.getElementById(
"warningSound"
);

/* =========================
   START SEQUENCE
========================= */

enterButton.onclick = ()=>{

entryScreen.style.display =
"none";

title.style.opacity =
"1";

title.style.animation =
"titleBurst 1.2s forwards";

titleSound.play()
.catch(()=>{});

/* screen shake */

document.body.style.animation =
"shake .08s 12";

setTimeout(()=>{

title.style.animation =
"titleMove 1.5s forwards";

},1500);

/* warning */

setTimeout(()=>{

warningBox.style.opacity =
"1";

warningBox.style.animation =
"warningShake .08s 12";

warningSound.play()
.catch(()=>{});

loader.style.opacity =
"1";

},3200);

};

/* =========================
   PROCEED
========================= */

proceed.onclick = ()=>{

title.classList.add(
"flash"
);

warningBox.classList.add(
"flash"
);

setTimeout(()=>{

window.location.href =
"website.html";

},1000);

};

</script>

</body>
</html>
