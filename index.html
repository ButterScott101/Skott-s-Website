<!DOCTYPE html>
<html>
<head>
<title>WARNING</title>

<style>

body {

  margin: 0;

  background: black;

  color: #ff0000;

  font-family: monospace;

  overflow: hidden;

  display: flex;

  justify-content: center;

  align-items: center;

  height: 100vh;

  text-shadow:
  0 0 5px #ff0000,
  0 0 10px #ff0000;

}

/* CRT */

body::before {

  content: "";

  position: fixed;

  inset: 0;

  pointer-events: none;

  background:
  repeating-linear-gradient(
    to bottom,
    rgba(0,255,0,.04) 0px,
    rgba(0,255,0,.04) 1px,
    transparent 2px,
    transparent 4px
  );

}

/* MAIN */

#warning {

  width: min(800px, 90vw);

  padding: 40px;

  border: 3px solid #4b0000;

  box-shadow:
  0 0 15px #69000e,
  0 0 40px rgba(255, 0, 0, 0.4);

  background:
  rgba(0,0,0,.85);

  animation:
  pulse 3s infinite;

}

@keyframes pulse {

  0% {

    box-shadow:
    0 0 15px #740000,
    0 0 40px rgba(92, 21, 0, 0.4);

  }

  50% {

    box-shadow:
    0 0 25px #8f0000,
    0 0 70px rgba(100, 0, 0, 0.6);

  }

  100% {

    box-shadow:
    0 0 15px #6e0000,
    0 0 40px rgba(241, 0, 0, 0.4);

  }

}

h1 {

  margin-top: 0;

  font-size: 3rem;

}

ul {

  font-size: 1.2rem;

  line-height: 1.8;

}

/* BUTTON */

#proceed {

  margin-top: 30px;

  font-size: 1.5rem;

  cursor: pointer;

  border: 2px solid #ff0000;

  padding: 10px 20px;

  display: inline-block;

  transition: .2s;

}

#proceed:hover {

  background:
  rgba(0,255,102,.15);

  transform:
  translateY(-2px);

}

/* LOADING BOX */

#loader {

  position: absolute;

  right: 40px;

  bottom: 40px;

  text-align: center;

  font-size: .9rem;

}

#bar {

  width: 120px;

  height: 18px;

  border: 2px solid #ff0000;

  overflow: hidden;

}

#fill {

  height: 100%;

  width: 60%;

  background: #3b0000;

  animation:
  glitchLoad .8s infinite;

}

@keyframes glitchLoad {

  0% {

    width: 55%;

  }

  50% {

    width: 70%;

  }

  100% {

    width: 60%;

  }

}

#unmuteBtn {

  margin-top: 15px;

  display: inline-block;

  cursor: pointer;

  padding: 8px 16px;

  border: 2px solid #ff0000;

  user-select: none;

  transition: .2s;

}

#unmuteBtn:hover {

  background:
  rgba(0,255,102,.15);

}

.glitchText {

  animation:
  glitchText .2s infinite;

}

@keyframes glitchText {

  0% {
    transform: translate(0px);
  }

  25% {
    transform: translate(-1px);
  }

  50% {
    transform: translate(1px);
  }

  75% {
    transform: translate(-1px);
  }

  100% {
    transform: translate(0px);
  }

}

</style>
</head>
<body>

<div id="warning">

<h1>WARNING</h1>

<p>
This website contains:
</p>

<ul>

<li>Audio</li>

<li>Flashing imagery</li>

<li>Hidden content</li>

<li>Unsettling themes</li>

<li>Experimental visual effects</li>

</ul>

<p>

Viewer discretion is advised.

</p>

<div id="proceed">

CLICK TO PROCEED

</div>

<div id="unmuteBtn">

[SOUND: OFF]

</div>

</div>

<div id="loader">

<div id="bar">

<div id="fill"></div>

</div>

<br>

LOADING...

</div>

<audio
id="bgMusic"
loop>

<source
src="audio/warning.mp3"
type="audio/mp3">

</audio>

<script>

const music =
document.getElementById(
"bgMusic"
);

const proceed =
document.getElementById(
"proceed"
);

/* user interaction */

const unmuteBtn =
document.getElementById(
"unmuteBtn"
);

let musicEnabled =
false;

unmuteBtn.onclick = () => {

  if(!musicEnabled){

    musicEnabled = true;

    music.volume = 0.5;

    music.play()
    .catch(()=>{});

    unmuteBtn.innerHTML =
    "[SOUND: ON]";

  } else {

    musicEnabled = false;

    music.pause();

    unmuteBtn.innerHTML =
    "[SOUND: OFF]";

  }

};

proceed.onclick = () => {

  document.body.style.opacity =
  "0";

  document.body.style.transition =
  "1s";

  setTimeout(() => {

    window.location.href =
    "website.html";

  }, 1000);

};



</script>

</body>
</html>
