<!DOCTYPE html>
<html>
<head>
<title>DESCEND</title>

<style>

body{

margin:0;

background:black;

color:#00ff66;

font-family:monospace;

overflow:hidden;

display:flex;

justify-content:center;
align-items:center;

height:100vh;

text-shadow:
0 0 5px #00ff66;

}

#screen{

white-space:pre;

font-size:24px;

line-height:1.1;

user-select:none;

}

#message{

position:fixed;

bottom:20px;

left:50%;

transform:translateX(-50%);

font-size:1rem;

opacity:.8;

}

#encounter{

position:fixed;

inset:0;

background:black;

display:none;

justify-content:center;
align-items:center;

flex-direction:column;

color:white;

font-size:3rem;

z-index:9999;

}

#creepyText{

opacity:0;

transition:2s;

font-size:3rem;

text-align:center;

}

</style>
</head>
<body>

<pre id="screen"></pre>

<div id="message">

WASD TO MOVE

</div>

<div id="encounter">

<div id="creepyText"></div>

</div>

<!-- AUDIO -->

<!-- AUDIO -->

<audio
id="walkSound"
src="audio/walk.mp3"></audio>

<audio
id="lightsOff"
src="audio/lightoff.mp3"></audio>

<audio
id="ambience"
src="audio/mazeambience.mp3"
loop></audio>

<audio
id="hunterMusic"
src="audio/disstressing.mp3"
loop></audio>

<script>

/* =====================
   AUDIO
===================== */

const walkSound =
document.getElementById(
"walkSound"
);

const lightsOff =
document.getElementById(
"lightsOff"
);

const ambience =
document.getElementById(
"ambience"
);

const hunterMusic =
document.getElementById(
"hunterMusic"
);

/* =====================
   MAP
===================== */

const map = [

"####################",
"#@      #         ##",
"######  #  ###### ##",
"#       #       # ##",
"# ####### ### # # ##",
"#       # #   # # ##",
"# ### # # # ### # ##",
"#   # #   #     #>##",
"####################"

];

let playerX = 1;
let playerY = 1;

let level = 1;

let hunterX = -1;
let hunterY = -1;

let hunterActive = false;

/* =====================
   DRAW
===================== */

const screen =
document.getElementById(
"screen"
);

function drawMap(){

let output = "";

for(
let y=0;
y<map.length;
y++
){

for(
let x=0;
x<map[y].length;
x++
){
if(
x===playerX &&
y===playerY
){

  output += "@";

}
else if(
hunterActive &&
x===hunterX &&
y===hunterY
){

  output += "X";

}
else{

  output +=
    map[y][x];

}

}

output += "\n";

}

screen.textContent =
output;

}

drawMap();

/* =====================
   MOVEMENT
===================== */

document.addEventListener(
"keydown",
e=>{

let dx = 0;
let dy = 0;

if(e.key==="w")
dy = -1;

if(e.key==="s")
dy = 1;

if(e.key==="a")
dx = -1;

if(e.key==="d")
dx = 1;

const newX =
playerX + dx;

const newY =
playerY + dy;

const tile =

map[newY]?.[newX];

if(
tile === "#"
)
return;

if(dx!==0||dy!==0){

walkSound.currentTime =
0;

walkSound.play()
.catch(()=>{});

}

playerX = newX;
playerY = newY;
moveHunter();

drawMap();

/* encounter */

if(tile === ">"){

nextLevel();

}

});

/* i dont feel like making a decor 
but this is for hunter */

function moveHunter(){

  if(!hunterActive)
    return;

  if(hunterX < playerX)
    hunterX++;

  else if(hunterX > playerX)
    hunterX--;

  if(hunterY < playerY)
    hunterY++;

  else if(hunterY > playerY)
    hunterY--;

  if(
    hunterX === playerX &&
    hunterY === playerY
  ){

    startEncounter();

  }

}

/* new level bitch */

function nextLevel(){

  level++;

  document.getElementById(
    "message"
  ).textContent =
    "LEVEL " + level;

  playerX = 1;
  playerY = 1;

  if(level >= 2){

  hunterActive = true;

  hunterX = 17;
  hunterY = 7;

  if(level === 2){

    hunterMusic.play()
      .catch(()=>{});

  }

}

  if(level > 10){

    window.location.href =
      "victory.html";

  }

  drawMap();

}

/* =====================
   ENCOUNTER
===================== */

const creepyLines = [

"пойманный"

];

function startEncounter(){

   hunterMusic.pause();

document.getElementById(
"encounter"
).style.display =
"flex";


lightsOff.play()
.catch(()=>{});

const text =
document.getElementById(
"creepyText"
);

text.innerHTML =

creepyLines[
Math.floor(
Math.random() *
creepyLines.length
)
];

setTimeout(()=>{

text.style.opacity =
"1";

},300);

setTimeout(()=>{

window.location.href =
"encounter.html";

},6000);


}

/* =====================
   START MUSIC
===================== */

document.addEventListener(
"click",
()=>{

ambience.play()
.catch(()=>{});

},
{once:true});

</script>

</body>
</html>
