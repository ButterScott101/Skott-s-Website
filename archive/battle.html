<!DOCTYPE html>
<html lang="en">
<head>
  <title>Encounter</title>

  <style>

    body {
      margin: 0;
      background: #dcdcdc;
      overflow: hidden;
      font-family: monospace;
      image-rendering: pixelated;
      opacity: 0;
      animation: fadeIn 2s forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    /* =========================
       TOP BOX
    ========================= */

    #topBox {

      position: absolute;

      top: 15px;
      left: 50%;

      transform: translateX(-50%);

      width: 90%;
      height: 95px;

      background: #ececec;

      border: 5px solid black;
      border-radius: 20px;

      display: flex;
      align-items: center;
      justify-content: center;

      overflow: hidden;

      box-sizing: border-box;

      font-size: 3rem;
      text-align: center;

    }

    #topText {

      transition: 0.2s;

    }

    /* =========================
       ENEMY
    ========================= */

    #enemy {

      position: absolute;

      top: 42%;
      left: 50%;

      transform: translate(-50%, -50%);

      width: 380px;

      image-rendering: pixelated;

      z-index: 5;

      animation: float 3s ease-in-out infinite;

      filter:
        drop-shadow(0 0 10px rgba(0,0,0,0.3));

    }

    @keyframes float {

      0% {
        transform:
          translate(-50%, -50%)
          translateY(0px);
      }

      50% {
        transform:
          translate(-50%, -50%)
          translateY(-8px);
      }

      100% {
        transform:
          translate(-50%, -50%)
          translateY(0px);
      }

    }

    /* =========================
       LEFT BOX
    ========================= */

    #leftBox {

      position: absolute;

      bottom: 20px;
      left: 20px;

      width: 390px;
      height: 270px;

      background: #ffffff;

      border: 5px solid rgb(114, 0, 180);
      border-radius: 1%;

      padding: 20px;

      box-sizing: border-box;

    }

    /* =========================
       RIGHT BOX
    ========================= */

    #rightBox {

      position: absolute;

      bottom: 30px;
      right: 40px;

      width: 290px;
      height: 250px;

      background: #f5f5f5;

      border: 5px solid black;
      border-radius: 20px;

      padding: 20px;

      box-sizing: border-box;

      font-size: 1.2rem;
      line-height: 1.6;

    }

    /* =========================
       OPTIONS
    ========================= */

    .option {

      font-size: 2rem;

      margin-bottom: 14px;

      cursor: pointer;

      transition: 0.15s;

      user-select: none;

    }

    .option:hover {

      color: #0055ff;

      transform: translateX(5px);

    }

    /* =========================
       STATS
    ========================= */

    #stats {

      position: absolute;

      bottom: 20px;
      right: 15px;

      text-align: right;

      font-size: 1.1rem;

      line-height: 1.5;

    }

    /* =========================
       DIALOGUE
    ========================= */

    #dialogue {

      white-space: pre-line;

    }

    /* =========================
       YOU MUST
    ========================= */

    #mustText {

      position: fixed;

      inset: 0;

      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 7rem;
      font-weight: bold;

      letter-spacing: 20px;

      color: #b30000;

      opacity: 0;

      pointer-events: none;

      z-index: 999;

      text-transform: uppercase;

      text-shadow:
        0 0 10px red,
        0 0 20px darkred,
        0 0 40px red;

      transform: scaleX(1.4);

    }

    @keyframes flashMust {

      0% {

        opacity: 0;

        transform:
          scaleX(1.4)
          scaleY(0.9);

        filter: blur(4px);

      }

      20% {

        opacity: 0.9;

        transform:
          scaleX(1.6)
          scaleY(1.1);

        filter: blur(0px);

      }

      40% {

        opacity: 0.3;

        transform:
          scaleX(1.5)
          scaleY(1);

      }

      60% {

        opacity: 1;

        transform:
          scaleX(1.7)
          scaleY(1.15);

      }

      100% {

        opacity: 0;

        transform:
          scaleX(1.4)
          scaleY(0.9);

        filter: blur(5px);

      }

    }

    /* =========================
       STATIC
    ========================= */

    #static {

      position: fixed;

      inset: 0;

      pointer-events: none;

      opacity: 0.05;

      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.05) 0px,
          rgba(255,255,255,0.05) 1px,
          transparent 2px,
          transparent 4px
        );

      animation: noise 0.2s infinite;

    }

    @keyframes noise {

      0% {
        transform: translate(0px,0px);
      }

      50% {
        transform: translate(-1px,1px);
      }

      100% {
        transform: translate(1px,-1px);
      }

    }

    /* =========================
       GLITCH LINES
    ========================= */

    .glitchLine {

      position: absolute;

      left: 0;

      width: 100%;

      pointer-events: none;

      z-index: 999;

      opacity: 0.7;

    }

  </style>
</head>

<body>

<!-- =========================
     TOP BOX
========================= -->

<div id="topBox">

  <span id="topText">
    (KJASX_#) BLOCKS THE WAY
  </span>

</div>

<!-- =========================
     ENEMY IMAGE
========================= -->

<img
  id="enemy"
  src="images/enemy.png"
  alt="enemy">

<!-- =========================
     LEFT BOX
========================= -->

<div id="leftBox">

  <div class="option"
       onclick="fight()">
    FIGHT
  </div>

  <div class="option"
       onclick="item()">
    ITEM
  </div>

  <div class="option"
       onclick="flee()">
    FLEE
  </div>

  <div class="option"
       onclick="observe()">
    OBSERVE
  </div>

  <div id="stats">

    HP: 90<br>
    AL3XAN: 200<br>
    MENTAL: 100

  </div>

</div>

<!-- =========================
     RIGHT BOX
========================= -->

<div id="rightBox">

  <div id="dialogue">

    This person didn't
    do anything wrong,
    please stop...

  </div>

</div>

<!-- =========================
     MUST TEXT
========================= -->

<div id="mustText">
  YOU MUST
</div>

<!-- =========================
     STATIC
========================= -->

<div id="static"></div>

<!-- =========================
     AUDIO
========================= -->

<audio
  id="battleMusic"
  src="audio/battle.mp3"
  loop></audio>

<audio
  id="lowHpMusic"
  src="audio/lowhp.mp3"
  loop></audio>

<audio
  id="selectSound"
  src="audio/select.mp3"></audio>

<audio
  id="hitSound"
  src="audio/hit.mp3"></audio>

<script>

/* =========================
   ELEMENTS
========================= */

const dialogue =
  document.getElementById("dialogue");

const stats =
  document.getElementById("stats");

const mustText =
  document.getElementById("mustText");

const topText =
  document.getElementById("topText");

const battleMusic =
  document.getElementById("battleMusic");

const lowHpMusic =
  document.getElementById("lowHpMusic");

const selectSound =
  document.getElementById("selectSound");

const hitSound =
  document.getElementById("hitSound");

/* =========================
   PLAYER STATS
========================= */

let hp = 150;
let enemyHp = 80;
let mental = 100;

let heals = 3;

let lowHpTriggered = false;

let locked = false;
let battleOver = false;

/* =========================
   START MUSIC
========================= */

document.addEventListener("click", () => {

  battleMusic.volume = 0.5;

  battleMusic.play().catch(()=>{});

}, { once:true });

/* =========================
   UPDATE STATS
========================= */

function updateStats() {

  stats.innerHTML =

`HP: ${hp}<br>
AL3XAN: ${enemyHp}<br>
MENTAL: ${mental}`;

}

/* =========================
   LOW HP MUSIC
========================= */

function checkLowHp() {

  if (hp <= 30 &&
      !lowHpTriggered) {

    lowHpTriggered = true;

    battleMusic.pause();

    lowHpMusic.volume = 0.6;

    lowHpMusic.play().catch(()=>{});

    dialogue.innerHTML =
      "YOUR INSTINCTS KICK IN.";

  }
}

/* =========================
   SOUND
========================= */

function select() {

  selectSound.currentTime = 0;

  selectSound.play().catch(()=>{});

}

/* =========================
   GLITCH TEXT
========================= */

const glitches = [

  "(KJASX_#) BLOCKS THE WAY",

  "(VVHY D1D Y0U) BLOCKS THE WAY",

  "(ER_R0R) BLOCKS THE WAY",

  "(1T KN0WS) BLOCKS THE WAY",

  "(D0NT LOOK) BLOCKS THE WAY",

  "(H3 L!3S) BLOCKS THE WAY",

  "(STAY AWAY) BLOCKS THE WAY",

  "(WHO ARE YOU) BLOCKS THE WAY",

  "(HELP ME) BLOCKS THE WAY"

];

setInterval(() => {

  topText.textContent =

    glitches[
      Math.floor(
        Math.random() *
        glitches.length
      )
    ];

}, 2000);

/* =========================
   GLITCH LINES
========================= */

function createGlitchLine() {

  const line =
    document.createElement("div");

  line.className =
    "glitchLine";

  line.style.top =
    Math.random() *
    window.innerHeight + "px";

  line.style.height =
    (2 + Math.random() * 4) + "px";

  line.style.background =
    `hsl(${Math.random()*360},
    100%,50%)`;

  document.body.appendChild(line);

  setTimeout(() => {

    line.remove();

  }, 100);

}

setInterval(() => {

  if (Math.random() < 0.4) {

    createGlitchLine();

  }

}, 140);

/* =========================
   ENEMY TURN
========================= */

function enemyTurn() {

  locked = true;

  dialogue.innerHTML =
    "AL3XAN ATTACKS";

  setTimeout(() => {

    const damage =
      Math.floor(Math.random()*14)+8;

    hp -= damage;

    mental -=
      Math.floor(Math.random()*5)+2;

    if (hp < 0)
      hp = 0;

    if (mental < 0)
      mental = 0;

    hitSound.currentTime = 0;

    hitSound.play().catch(()=>{});

    dialogue.innerHTML =
      `YOU TOOK ${damage} DAMAGE`;

    updateStats();

    checkLowHp();

    if (hp <= 0) {

      battleOver = true;

      setTimeout(() => {

        dialogue.innerHTML =
          "YOU COLLAPSE.";

        setTimeout(() => {

          window.location.href =
            "underground.html";

        }, 3000);

      }, 1500);

      return;
    }

    setTimeout(() => {

      locked = false;

      dialogue.innerHTML =
        "YOUR MOVE.";

    }, 1300);

  }, 1500);
}

/* =========================
   FIGHT
========================= */

function fight() {

  if (locked ||
      battleOver)
      return;

  locked = true;

  select();

  const damage =
    Math.floor(Math.random()*18)+8;

  enemyHp -= damage;

  if (enemyHp < 0)
    enemyHp = 0;

  hitSound.currentTime = 0;

  hitSound.play().catch(()=>{});

  dialogue.innerHTML =

`AL3XAN TOOK
${damage} DAMAGE`;

  updateStats();

  if (enemyHp <= 0) {

    battleOver = true;

    setTimeout(() => {

      dialogue.innerHTML =
        "THE HALLUCINATION FADES.";

      lowHpMusic.pause();
      battleMusic.pause();

      setTimeout(() => {

        window.location.href =
          "/";

      }, 4000);

    }, 1500);

    return;
  }

  setTimeout(() => {

    enemyTurn();

  }, 1500);
}

/* =========================
   ITEM
========================= */

function item() {

  if (locked ||
      battleOver)
      return;

  locked = true;

  select();

  if (heals <= 0) {

    dialogue.innerHTML =
      "NOTHING REMAINS.";

    locked = false;

    return;
  }

  heals--;

  const amount =
    Math.floor(Math.random()*18)+15;

  hp += amount;

  if (hp > 90)
    hp = 90;

  dialogue.innerHTML =

`YOU RECOVERED
${amount} HP`;

  updateStats();

  setTimeout(() => {

    enemyTurn();

  }, 1500);
}

/* =========================
   OBSERVE
========================= */

const observations = [

  "He looks terrified.",

  "He's trying to calm you down.",

  "You remember his voice.",

  "He keeps backing away.",

  "Your hands won't stop shaking.",

  "Something feels horribly wrong.",

  "Why does he look familiar?",

  "You don't think he's the enemy."

];

function observe() {

  if (locked ||
      battleOver)
      return;

  select();

  dialogue.innerHTML =

    observations[
      Math.floor(
        Math.random() *
        observations.length
      )
    ];

}

/* =========================
   FLEE
========================= */

function flee() {

  if (locked ||
      battleOver)
      return;

  select();

  mustText.innerHTML =
    "YOU MUST";

  mustText.style.animation =
    "flashMust 1.6s ease";

  dialogue.innerHTML =
    "YOUR BODY REFUSES.";

  document.body.style.filter =
    "contrast(1.2) blur(1px)";

  setTimeout(() => {

    document.body.style.filter =
      "";

    mustText.style.animation =
      "none";

  }, 1200);

}

</script>

</body>
</html>
